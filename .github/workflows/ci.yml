name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Builds the embedded dashboard (ui/, a Vue app) fresh and uploads it so
  # every Go job below overwrites the committed placeholder/baseline at
  # internal/webui/dist with the real thing before compiling - the
  # committed copy exists only so a bare `go build` works on a fresh clone
  # without Node installed, never as what CI actually validates.
  ui:
    name: Build dashboard (ui/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Test
        working-directory: ui
        run: npm run test
      - name: Build
        working-directory: ui
        run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webui-dist
          path: internal/webui/dist

  build:
    name: Build, Vet & Test
    needs: [ui]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webui-dist
          path: internal/webui/dist

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -covermode=atomic

  lint:
    name: golangci-lint
    needs: [ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webui-dist
          path: internal/webui/dist
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6

  govulncheck:
    name: Dependency CVE Audit
    needs: [ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webui-dist
          path: internal/webui/dist
      - name: govulncheck
        # Non-blocking: as of writing this also flags GO-2026-5856, a Go
        # stdlib crypto/tls issue with no patched 1.26.x release available
        # yet on the runner's Go version index. There is nothing this repo
        # can do about an unfixed stdlib CVE beyond waiting for a point
        # release - re-evaluate removing continue-on-error once one ships.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  secrets-scan:
    name: Scan for Secrets & Credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown

  codeql:
    name: CodeQL
    needs: [ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webui-dist
          path: internal/webui/dist
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:go

  # Creates an annotated tag on the current HEAD and pushes it - no commit to
  # main is needed, so branch protection is never triggered.
  # Pushing the tag fires release.yml, which cross-compiles and publishes
  # binaries via goreleaser.
  #
  # Bump rules:
  #   feat!: / BREAKING CHANGE  -> major
  #   feat:                      -> minor
  #   fix: / perf: / refactor: / security:  -> patch
  #   docs: / chore: / ci:       -> no release
  auto-release:
    name: Auto Tag & Release
    needs: [build, lint]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      # ── 1. Determine bump type from Conventional Commits ─────────────────
      - name: Determine version bump
        id: bump
        run: |
          set -euo pipefail

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"
          echo "Latest tag: $LATEST_TAG"

          if git rev-parse "${LATEST_TAG}" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s %b")
          else
            COMMITS=$(git log --format="%s %b")
          fi

          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING.CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor|security)(\([^)]*\))?:'; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"
          echo "bump=${BUMP}"             >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      # ── 2. Compute the new version number ─────────────────────────────────
      - name: Compute new version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          LATEST="${{ steps.bump.outputs.latest_tag }}"
          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)

          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      # ── 3. Create annotated tag and push it ────────────────────────────────
      #
      # Pushing a tag does not touch any branch, so branch protection rules
      # are not involved.
      #
      # NOTE: GITHUB_TOKEN tag pushes do not trigger downstream workflows
      # (GitHub anti-loop policy). release.yml is dispatched explicitly in
      # the next step instead of relying on the push event.
      - name: Create and push version tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin "$NEW_TAG"
          echo "Tag ${NEW_TAG} pushed"

      # ── 4. Dispatch release.yml for the new tag ────────────────────────────
      #
      # GITHUB_TOKEN tag pushes do not fire push.tags triggers in other
      # workflows. Dispatch explicitly so the release build runs.
      - name: Dispatch release workflow
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "$NEW_TAG"
