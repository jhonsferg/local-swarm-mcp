version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: local-swarm-mcp
    main: ./cmd/local-swarm-mcp
    binary: local-swarm-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: local-swarm-mcp
    ids: [local-swarm-mcp]
    name_template: "local-swarm-mcp_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - config.example.yaml
      - config.example.json

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  github:
    owner: jhonsferg
    name: local-swarm-mcp
