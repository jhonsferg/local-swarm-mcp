version: 2

before:
  hooks:
    # Rebuilds the embedded dashboard fresh into internal/webui/dist
    # (see ui/vite.config.ts) before go:embed picks it up, so a release
    # binary always ships the real UI, not the committed placeholder.
    # Requires Node - CI's release workflow runs this explicitly first
    # too, so this is mainly for a local `goreleaser build/release`.
    # global before.hooks exec directly with no shell (no "&&"/"cd"), and
    # "sh" isn't guaranteed to exist on Windows - "npm --prefix" avoids
    # needing either.
    - npm --prefix ui ci
    - npm --prefix ui run build
    - go mod tidy

builds:
  - id: local-swarm-mcp
    main: ./cmd/local-swarm-mcp
    binary: local-swarm-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: local-swarm-mcp
    ids: [local-swarm-mcp]
    name_template: "local-swarm-mcp_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - config.example.yaml
      - config.example.json

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  github:
    owner: jhonsferg
    name: local-swarm-mcp
